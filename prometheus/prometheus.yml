# ============================================================
#  prometheus.yml — Main Prometheus Configuration
#  Place at: /etc/prometheus/prometheus.yml
# ============================================================

global:
  scrape_interval: 15s       # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate alert rules
  scrape_timeout: 10s

# Point to our alert rules file
rule_files:
  - "alert_rules.yml"

# Alertmanager config (optional — enable if you set up Alertmanager)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['localhost:9093']

# ── Scrape Configs ─────────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "prometheus-server"

  # Node Exporter — system metrics (CPU, memory, disk, network)
  - job_name: "node_exporter"
    static_configs:
      - targets: ["localhost:9100"]
        labels:
          instance: "local-server"
          env: "production"

  # ── Add more targets here as you scale ──────────────────
  # Example: scrape a second server
  # - job_name: "node_exporter_remote"
  #   static_configs:
  #     - targets: ["192.168.1.50:9100"]
  #       labels:
  #         instance: "web-server-2"
  #         env: "production"

  # Example: AWS EC2 auto-discovery (requires IAM role)
  # - job_name: "ec2_nodes"
  #   ec2_sd_configs:
  #     - region: ap-south-1
  #       port: 9100
  #   relabel_configs:
  #     - source_labels: [__meta_ec2_tag_Name]
  #       target_label: instance
